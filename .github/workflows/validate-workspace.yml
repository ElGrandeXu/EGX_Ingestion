name: Validate Workspace
run-name: Validate EGX_Ingestion workspace

# Validates the minimal agent-first workspace contract.

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: Run workspace validation
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Validate minimal workspace
        shell: pwsh
        run: .\scripts\check_workspace.ps1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install CLI
        run: python -m pip install -e .

      - name: Test CLI
        shell: pwsh
        run: |
          egx --help
          egx status
          egx ingest https://github.com/example/repo --provider openai --model default --mode caveman --self-review
          egx logs --last 3
          egx review --last 1
          egx export repo --format json
          egx check
